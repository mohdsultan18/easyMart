<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign up — EasyMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" defer src="/src/javascript/auth.js"></script>
  </head>
  <body class="min-h-screen bg-[#faf7ff] flex flex-col">
    <header
      class="w-full border-b border-[#e4d7ff] bg-white/70 backdrop-blur-md"
    >
      <div
        class="max-w-5xl mx-auto flex items-center justify-center h-16 px-4 md:px-6 gap-3 text-[#7b1ab5]"
      >
        <img src="./src/assets/icons/Type=Logo, Dark=Yes.svg" alt="" />
      </div>
    </header>

    <main
      class="flex-1 flex flex-col items-center px-4 pt-10 md:pt-16 pb-12 lg:pb-20"
    >
      <div class="w-full max-w-md">
        <h1 class="text-2xl md:text-3xl font-semibold text-gray-900 mb-8">
          Sign Up
        </h1>

        <section
          class="bg-white rounded-3xl shadow-[0_18px_45px_rgba(132,60,196,0.08)] border border-[#f0e6ff] px-6 py-7 md:px-8 md:py-8"
        >
          <div
            class="inline-flex items-center rounded-full bg-[#faf7ff] border border-[#f0e6ff] p-1 mb-6"
          >
            <button
              type="button"
              class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium bg-[#e21ea5] text-white shadow-sm"
            >
              <span
                class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-white/10 border border-white/30"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                >
                  <rect
                    x="3"
                    y="5"
                    width="18"
                    height="14"
                    rx="2.2"
                    ry="2.2"
                  ></rect>
                  <path d="M4 7.5L11.4 12a1.5 1.5 0 001.6 0L20 7.5" />
                </svg>
              </span>
              <span>Email</span>
            </button>
            <button
              type="button"
              class="ml-1 flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium text-gray-500 hover:text-gray-800"
            >
              <span
                class="inline-flex items-center justify-center w-5 h-5 rounded-full border border-gray-200"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  class="w-3.5 h-3.5 text-gray-400"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                >
                  <path
                    d="M8.8 3.5h6.4c.9 0 1.6.7 1.6 1.6v13.8c0 .9-.7 1.6-1.6 1.6H8.8a1.6 1.6 0 01-1.6-1.6V5.1c0-.9.7-1.6 1.6-1.6z"
                  />
                  <path d="M10 6h4" />
                  <circle cx="12" cy="18" r="1" />
                </svg>
              </span>
              <span>Phone</span>
            </button>
          </div>

          <form id="signup-form" class="space-y-4">
            <div class="space-y-1.5">
              <label
                for="signup-name"
                class="block text-xs font-medium tracking-wide text-gray-700"
                >Full name</label
              >
              <div
                class="relative rounded-xl border border-[#e3d5ff] bg-[#fbf9ff] focus-within:border-[#d024a7] focus-within:ring-2 focus-within:ring-[#f4b1f0]"
              >
                <input
                  id="signup-name"
                  type="text"
                  required
                  placeholder="Enter your full name"
                  class="w-full bg-transparent px-3.5 py-2.5 text-sm outline-none text-gray-900 placeholder:text-gray-400"
                />
              </div>
            </div>

            <div class="space-y-1.5">
              <label
                for="signup-email"
                class="block text-xs font-medium tracking-wide text-gray-700"
                >Email</label
              >
              <div
                class="relative rounded-xl border border-[#e3d5ff] bg-[#fbf9ff] focus-within:border-[#d024a7] focus-within:ring-2 focus-within:ring-[#f4b1f0]"
              >
                <input
                  id="signup-email"
                  type="email"
                  required
                  placeholder="Email"
                  class="w-full bg-transparent px-3.5 py-2.5 text-sm outline-none text-gray-900 placeholder:text-gray-400"
                />
              </div>
            </div>

            <div class="space-y-1.5">
              <label
                for="signup-password"
                class="block text-xs font-medium tracking-wide text-gray-700"
                >Password</label
              >
              <div
                class="relative rounded-xl border border-[#e3d5ff] bg-[#fbf9ff] focus-within:border-[#d024a7] focus-within:ring-2 focus-within:ring-[#f4b1f0]"
              >
                <input
                  id="signup-password"
                  type="password"
                  required
                  placeholder="Create a password"
                  class="w-full bg-transparent px-3.5 py-2.5 pr-16 text-sm outline-none text-gray-900 placeholder:text-gray-400"
                />
                <button
                  id="toggle-signup-pw"
                  type="button"
                  class="absolute inset-y-0 right-0 px-3 text-xs font-medium text-[#d024a7] hover:text-[#a3147d]"
                >
                  Show
                </button>
              </div>
              <p class="text-xs text-gray-500 mt-1">
                Use at least 6 characters.
              </p>
            </div>

            <button
              type="submit"
              class="mt-4 w-full inline-flex items-center justify-center gap-2 rounded-full bg-[#d024a7] hover:bg-[#b51a8e] text-white text-sm font-semibold py-2.5 shadow-[0_14px_30px_rgba(208,36,167,0.35)] transition-colors"
            >
              <span>Continue</span>
              <span
                class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-white/15 border border-white/30"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  class="w-3.5 h-3.5"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path d="M5 12h13" />
                  <path d="M13 6l6 6-6 6" />
                </svg>
              </span>
            </button>
          </form>

          <p
            id="signup-msg"
            class="mt-3 text-sm text-red-600 min-h-[1.25rem]"
          ></p>
        </section>

        <p class="mt-8 text-sm text-center text-gray-600">
          Already have an account?
          <a
            href="login.html"
            class="font-semibold text-[#d024a7] hover:text-[#b51a8e]"
            >Login</a
          >
        </p>
      </div>
    </main>
  </body>
</html>
